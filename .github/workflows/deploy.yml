name: Deploy ORLYNE Bot

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Setup directories and install Node.js on VPS
        run: |
          sshpass -p 'Justin2026' ssh -o StrictHostKeyChecking=no root@95.111.252.213 "
            echo '🚀 Setting up VPS...'
            
            # Install Node.js 20
            if ! command -v node &> /dev/null; then
              echo '📦 Installing Node.js 20...'
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt install -y nodejs
            fi
            
            # Install ffmpeg
            if ! command -v ffmpeg &> /dev/null; then
              echo '🎬 Installing ffmpeg...'
              apt install -y ffmpeg
            fi
            
            # Install PM2
            if ! command -v pm2 &> /dev/null; then
              echo '⚙️ Installing PM2...'
              npm install -g pm2
            fi
            
            # Create directories
            mkdir -p /var/www/kira md/{accounts,data,temp,public,logs}
            
            echo '✅ VPS ready!'
          "

      - name: Deploy files
        run: |
          sshpass -p 'Justin2026' rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude 'accounts' \
            --exclude 'data' \
            --exclude 'temp' \
            ./ root@95.111.252.213:/var/www/kira md/
            
      - name: Install dependencies and restart bot
        run: |
          sshpass -p 'Justin2026' ssh -o StrictHostKeyChecking=no root@95.111.252.213 "
            cd /var/www/kira md
            
            echo '📦 Installing npm dependencies...'
            npm install --production
            
            echo '🔄 Restarting bot...'
            pm2 restart kira md || pm2 start index.js --name kira md
            pm2 save
            
            echo ''
            echo '📊 PM2 Status:'
            pm2 status
            
            echo ''
            echo '🌐 Testing health endpoint:'
            curl -s http://localhost:3000/health || echo '⚠️ Health check pending'
            
            echo ''
            echo '✅ Deployment completed!'
          "

      - name: Verify deployment
        run: |
          sleep 5
          echo "🔍 Verifying..."
          curl -s http://95.111.252.213:3000/health || echo "⚠️ Health check pending"
          echo ""
          echo "✅ Deployment finished!"
          echo "🌐 Site: https://abess.pagnol.xyz"
