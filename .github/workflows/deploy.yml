name: Deploy Maria Bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}

          script: |
            echo "🚀 Déploiement..."

            # 🔧 Installer Node.js si absent
            if ! command -v node &> /dev/null; then
              echo "📦 Installation Node.js..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt install -y nodejs
            fi

            # 🔧 Installer PM2 si absent
            if ! command -v pm2 &> /dev/null; then
              echo "⚙️ Installation PM2..."
              npm install -g pm2
            fi

            # 📁 Aller dans dossier
            mkdir -p ${{ secrets.VPS_PATH }}
            cd ${{ secrets.VPS_PATH }}

            # 📥 Clone ou update
            if [ ! -d "kira-md" ]; then
              echo "📥 Clone du projet..."
              git clone https://github.com/MANGA-BOT/kira-md.git
            else
              echo "📥 Mise à jour du code..."
              cd kira-md
              git pull origin main
              cd ..
            fi

            # 📂 Entrer dans projet
            cd kira-md

            echo "📦 Installation des dépendances..."
            rm -rf node_modules package-lock.json
            npm install

            # 🔥 FIX CRUCIAL
            npm install moment-timezone

            echo "⚡ Gestion PM2..."

            pm2 describe kira-md > /dev/null
            if [ $? -eq 0 ]; then
              echo "🔄 Restart bot"
              pm2 restart kira-md
            else
              echo "🆕 Démarrage bot"
              pm2 start index.js --name kira-md
            fi

            pm2 save

            echo "📊 Status PM2:"
            pm2 status

            echo "🌐 Vérification serveur..."
            sleep 5
            netstat -tulnp | grep node || echo "⚠️ Aucun port détecté"

            echo "✅ Deploy terminé"